name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install test dependencies
        run: |
          pip install flask transformers python-dotenv pytest
          # Install torch CPU-only (fast, sufficient for tests)
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: pytest test_app.py -v

  # ── Stage 2: Build & Push Docker Image ──────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/ml-lab-service:latest .

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ml-lab-service:latest

      - name: Tag with commit SHA
        run: |
          docker tag ${{ secrets.DOCKER_HUB_USERNAME }}/ml-lab-service:latest \
                     ${{ secrets.DOCKER_HUB_USERNAME }}/ml-lab-service:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ml-lab-service:${{ github.sha }}

  # ── Stage 3 (Bonus): Deploy via Docker Compose ──────────────────────────────
